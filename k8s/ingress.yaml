apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hori-ingress
spec:
  ingressClassName: nginx 
  rules:
  - host: hori.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 5173
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
